<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="css/login.css" />
    <title>Forgot Password - Talisay City College</title>
  </head>

  <body>
    <img src="images/background.jpg" alt="Background" class="logo" />
    <div class="login-card">
      <div class="login-header">
        <img
          src="images/tcc logo.png"
          alt="Talisay City College logo"
          class="school-logo"
        />
        <h2 class="mb-2">Talisay City College</h2>
      </div>
      <h3 class="mb-3">Forgot Password</h3>
      <p class="text-muted mb-4">
        Enter your username to receive a verification code
      </p>

      <div
        class="alert alert-danger mb-3"
        id="error-message"
        style="display: none"
      ></div>
      <div
        class="alert alert-success mb-3"
        id="success-message"
        style="display: none"
      ></div>

      <form id="resetPasswordForm" class="w-100">
        <div class="form-group mb-3">
          <label for="username" class="form-label" id="usernameLabel"
            >Username</label
          >
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Enter your username"
            required
            autofocus
          />
        </div>

        <div id="resetFields" style="display: none">
          <div class="form-group mb-3">
            <label for="verificationCode" class="form-label"
              >6-Digit Verification Code</label
            >
            <input
              type="text"
              class="form-control"
              id="verificationCode"
              name="verificationCode"
              inputmode="numeric"
              maxlength="6"
              placeholder="Enter the 6-digit code"
              autocomplete="one-time-code"
            />
          </div>
          <div id="passwordFields" style="display: none">
            <div class="form-group mb-3">
              <label for="newPassword" class="form-label">New Password</label>
              <input
                type="password"
                class="form-control"
                id="newPassword"
                name="newPassword"
                placeholder="Enter your new password"
                autocomplete="new-password"
              />
            </div>
            <div class="form-group mb-3">
              <label for="confirmNewPassword" class="form-label"
                >Confirm New Password</label
              >
              <input
                type="password"
                class="form-control"
                id="confirmNewPassword"
                name="confirmNewPassword"
                placeholder="Confirm your new password"
                autocomplete="new-password"
              />
            </div>
          </div>
        </div>
        <div id="submitButtonContainer">
          <button
            type="button"
            class="btn btn-primary w-100 mb-3"
            id="sendCodeBtn"
          >
            <i class="bi bi-envelope"></i> Send Code
          </button>
        </div>
        <div id="resetButtonContainer" style="display: none">
          <button
            type="button"
            class="btn btn-primary w-100 mb-3"
            id="resetPasswordBtn"
          >
            <i class="bi bi-shield-lock"></i> Reset Password
          </button>
        </div>
        <div id="loginButtonContainer" style="display: none">
          <a href="index.html" class="btn btn-primary w-100 mb-3">
            <i class="bi bi-box-arrow-in-right"></i> Go to Login
          </a>
        </div>
      </form>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
      const resetPasswordForm = document.getElementById("resetPasswordForm");
      const errorMessage = document.getElementById("error-message");
      const successMessage = document.getElementById("success-message");
      const usernameInput = document.getElementById("username");
      const usernameLabel = document.getElementById("usernameLabel");
      const submitButtonContainer = document.getElementById(
        "submitButtonContainer"
      );
      const resetFields = document.getElementById("resetFields");
      const passwordFields = document.getElementById("passwordFields");
      const resetButtonContainer = document.getElementById(
        "resetButtonContainer"
      );
      const loginButtonContainer = document.getElementById(
        "loginButtonContainer"
      );
      const sendCodeBtn = document.getElementById("sendCodeBtn");
      const resetPasswordBtn = document.getElementById("resetPasswordBtn");
      const verificationCodeInput = document.getElementById("verificationCode");
      const newPasswordInput = document.getElementById("newPassword");
      const confirmNewPasswordInput =
        document.getElementById("confirmNewPassword");

      // Prevent default submit (we use explicit buttons)
      resetPasswordForm.addEventListener("submit", (e) => e.preventDefault());

      function showError(msg) {
        successMessage.style.display = "none";
        errorMessage.textContent = msg;
        errorMessage.style.display = "block";
      }

      function showSuccess(msg) {
        errorMessage.style.display = "none";
        successMessage.textContent = msg;
        successMessage.style.display = "block";
      }

      function setButtonLoading(btn, loadingText) {
        if (!btn) return;
        btn.disabled = true;
        btn.dataset.originalHtml = btn.innerHTML;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>${loadingText}`;
      }

      function clearButtonLoading(btn) {
        if (!btn) return;
        btn.disabled = false;
        if (btn.dataset.originalHtml) {
          btn.innerHTML = btn.dataset.originalHtml;
          delete btn.dataset.originalHtml;
        }
      }

      // Code validation state
      let codeValidated = false;

      sendCodeBtn.addEventListener("click", async () => {
        errorMessage.style.display = "none";
        successMessage.style.display = "none";

        const username = usernameInput.value.trim();
        if (!username) {
          showError("Please enter your username.");
          return;
        }

        setButtonLoading(sendCodeBtn, "Sending Code...");

        try {
          const response = await AuthAPI.sendResetCode(username);
          showSuccess(response.message || "Verification code sent.");

          // Reveal reset fields + button
          resetFields.style.display = "block";
          resetButtonContainer.style.display = "block";

          // Lock username to avoid mismatched username/code confusion
          usernameInput.readOnly = true;
          verificationCodeInput.focus();
        } catch (error) {
          // Backend provides required message for Google-not-linked case
          showError(error.message || "An error occurred. Please try again.");
        } finally {
          clearButtonLoading(sendCodeBtn);
        }
      });

      resetPasswordBtn.addEventListener("click", async () => {
        errorMessage.style.display = "none";
        successMessage.style.display = "none";

        const username = usernameInput.value.trim();
        const code = (verificationCodeInput.value || "").trim();

        if (!username) {
          showError("Please enter your username.");
          return;
        }

        if (!/^\d{6}$/.test(code)) {
          showError("Please enter a valid 6-digit verification code.");
          return;
        }

        // If code not yet validated, validate it first
        if (!codeValidated) {
          setButtonLoading(resetPasswordBtn, "Validating Code...");
          try {
            const resp = await AuthAPI.validateResetCode(username, code);
            if (resp && resp.success) {
              codeValidated = true;
              passwordFields.style.display = "block";
              newPasswordInput.focus();
              resetPasswordBtn.innerHTML =
                '<i class="bi bi-shield-lock"></i> Reset Password';
              showSuccess(
                resp.message || "Code validated. Enter new password."
              );
            } else {
              showError(resp.error || "Invalid verification code.");
            }
          } catch (err) {
            showError(err.message || "Failed to validate code. Try again.");
          } finally {
            clearButtonLoading(resetPasswordBtn);
          }
          return;
        }

        // Code already validated: proceed to reset password
        const newPwd = newPasswordInput.value || "";
        const confirmPwd = confirmNewPasswordInput.value || "";

        if (!newPwd || !confirmPwd) {
          showError("Please enter and confirm your new password.");
          return;
        }

        if (newPwd !== confirmPwd) {
          showError("Passwords do not match.");
          return;
        }

        setButtonLoading(resetPasswordBtn, "Resetting Password...");

        try {
          const response = await AuthAPI.resetPasswordWithCode(
            username,
            code,
            newPwd,
            confirmPwd
          );

          showSuccess(response.message || "Password reset successfully.");
          loginButtonContainer.style.display = "block";
        } catch (error) {
          showError(error.message || "An error occurred. Please try again.");
        } finally {
          clearButtonLoading(resetPasswordBtn);
        }
      });
    </script>
  </body>
</html>
