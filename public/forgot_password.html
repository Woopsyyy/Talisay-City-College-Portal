<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="css/login.css" />
    <title>Forgot Password - Talisay City College</title>
  </head>

  <body>
    <img src="images/background.jpg" alt="Background" class="logo" />
    <div class="login-card">
      <div class="login-header">
        <img src="images/tcc logo.png" alt="Talisay City College logo" class="school-logo" />
        <h2 class="mb-2">Talisay City College</h2>
      </div>
      <h3 class="mb-3">Forgot Password</h3>
      <p class="text-muted mb-4">Enter your username to generate a new password</p>
      
      <div class="alert alert-danger mb-3" id="error-message" style="display: none;"></div>
      
      <form id="resetPasswordForm" class="w-100">
        <div class="form-group mb-3">
          <label for="username" class="form-label" id="usernameLabel">Username</label>
          <div id="passwordDisplay" style="display: none;">
            <div 
              id="newPassword" 
              class="form-control password-display-clickable password-centered" 
              onclick="copyPassword()"
              title="Click to copy password"
            ></div>
            <small class="text-muted d-block mt-2 text-center">
              <i class="bi bi-cursor"></i> Click the password to copy it
            </small>
          </div>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Enter your username"
            required
            autofocus
          />
        </div>
        <div id="submitButtonContainer">
          <button type="submit" class="btn btn-primary w-100 mb-3">
            <i class="bi bi-key"></i> Generate New Password
          </button>
        </div>
        <div id="loginButtonContainer" style="display: none;">
          <a href="index.html" class="btn btn-primary w-100 mb-3">
            <i class="bi bi-box-arrow-in-right"></i> Go to Login
          </a>
        </div>
      </form>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
      const resetPasswordForm = document.getElementById('resetPasswordForm');
      const errorMessage = document.getElementById('error-message');
      const usernameInput = document.getElementById('username');
      const usernameLabel = document.getElementById('usernameLabel');
      const passwordDisplay = document.getElementById('passwordDisplay');
      const submitButtonContainer = document.getElementById('submitButtonContainer');
      const loginButtonContainer = document.getElementById('loginButtonContainer');
      const newPasswordElement = document.getElementById('newPassword');

      // Handle URL parameters for error messages
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('error') === 'notfound') {
        errorMessage.textContent = 'Username not found. Please check and try again.';
        errorMessage.style.display = 'block';
      } else if (urlParams.get('error') === 'missing') {
        errorMessage.textContent = 'Please enter your username.';
        errorMessage.style.display = 'block';
      } else if (urlParams.get('success') === '1' && urlParams.get('password')) {
        // Show password display
        usernameLabel.textContent = 'Your New Password';
        usernameLabel.classList.add('text-center');
        usernameInput.style.display = 'none';
        passwordDisplay.style.display = 'block';
        newPasswordElement.textContent = urlParams.get('password');
        submitButtonContainer.style.display = 'none';
        loginButtonContainer.style.display = 'block';
      }

      // Handle form submission
      resetPasswordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMessage.style.display = 'none';

        const username = usernameInput.value.trim();

        if (!username) {
          errorMessage.textContent = 'Please enter your username.';
          errorMessage.style.display = 'block';
          return;
        }

        try {
          const response = await AuthAPI.resetPassword(username);
          
          if (response.success) {
            // Show password display
            usernameLabel.textContent = 'Your New Password';
            usernameLabel.classList.add('text-center');
            usernameInput.style.display = 'none';
            passwordDisplay.style.display = 'block';
            newPasswordElement.textContent = response.temporary_password || response.password;
            submitButtonContainer.style.display = 'none';
            loginButtonContainer.style.display = 'block';
          } else {
            errorMessage.textContent = response.message || 'An error occurred. Please try again.';
            errorMessage.style.display = 'block';
          }
        } catch (error) {
          errorMessage.textContent = error.message || 'An error occurred. Please try again.';
          errorMessage.style.display = 'block';
        }
      });

      function copyPassword() {
        const passwordElement = document.getElementById('newPassword');
        const passwordText = passwordElement.textContent.trim();
        
        // Try modern clipboard API first
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(passwordText).then(function() {
            showCopyFeedback(passwordElement);
          }).catch(function(err) {
            fallbackCopy(passwordText, passwordElement);
          });
        } else {
          // Fallback for browsers that don't support clipboard API
          fallbackCopy(passwordText, passwordElement);
        }
      }
      
      function fallbackCopy(text, element) {
        // Create a temporary textarea element
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-999999px';
        textarea.style.top = '-999999px';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        
        try {
          const successful = document.execCommand('copy');
          if (successful) {
            showCopyFeedback(element);
          } else {
            alert('Please select and copy the password manually: ' + text);
          }
        } catch (err) {
          alert('Please select and copy the password manually: ' + text);
        } finally {
          document.body.removeChild(textarea);
        }
      }
      
      function showCopyFeedback(element) {
        const originalText = element.textContent;
        const originalBg = element.style.backgroundColor;
        element.textContent = 'Copied!';
        element.style.backgroundColor = 'rgba(40, 167, 69, 0.2)';
        element.style.color = '#28a745';
        
        setTimeout(function() {
          element.textContent = originalText;
          element.style.backgroundColor = originalBg;
          element.style.color = '';
        }, 2000);
      }
    </script>
  </body>
</html>
