<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <title>Transparency</title>
    <style>
      body { background: #f7f6f2; }
      .topbar { display:flex; align-items:center; gap:12px; padding:12px 18px; }
      .profile-sm { width:40px; height:40px; border-radius:8px; object-fit:cover; }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="topbar">
        <img id="userImage" src="images/sample.jpg" alt="user" class="profile-sm" />
        <div>
          <div><strong id="userName">Loading...</strong></div>
          <div class="text-muted">Transparency / Projects</div>
        </div>
      </div>

      <div class="container mt-3">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">School Projects</h5>
            <div class="table-responsive">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Project Name</th>
                    <th>Budget</th>
                    <th>Project Started</th>
                    <th>Project Completed</th>
                  </tr>
                </thead>
                <tbody id="projectsTableBody">
                  <tr>
                    <td colspan="4" class="text-center">Loading projects...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script>
      // Check session and load user data
      async function init() {
        try {
          const session = await AuthAPI.checkSession();
          if (!session.authenticated) {
            window.location.href = 'index.html';
            return;
          }
          
          if (session.user) {
            document.getElementById('userImage').src = session.user.image_path || 'images/sample.jpg';
            document.getElementById('userName').textContent = session.user.full_name || session.user.username;
          }
          
          // Load projects
          await loadProjects();
        } catch (error) {
          console.error('Init error:', error);
          window.location.href = 'index.html';
        }
      }
      
      async function loadProjects() {
        try {
          const projects = await StudentAPI.getProjects();
          const tbody = document.getElementById('projectsTableBody');
          
          if (!projects || projects.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No project information available at this time.</td></tr>';
            return;
          }
          
          tbody.innerHTML = projects.map(proj => {
            const isCompleted = proj.completed && proj.completed.toLowerCase() === 'yes';
            const startedDate = proj.started ? new Date(proj.started).toLocaleDateString() : 'N/A';
            return `
              <tr>
                <td>${escapeHtml(proj.name || 'Unnamed Project')}</td>
                <td>${escapeHtml(proj.budget || 'N/A')}</td>
                <td>${startedDate}</td>
                <td>${isCompleted ? 'Yes' : 'No'}</td>
              </tr>
            `;
          }).join('');
        } catch (error) {
          console.error('Load projects error:', error);
          document.getElementById('projectsTableBody').innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error loading projects.</td></tr>';
        }
      }
      
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
      
      init();
    </script>
  </body>
</html>
